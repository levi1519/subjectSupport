{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SubjectSupport{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- EduLatam Theme -->
    <link rel="stylesheet" href="{% static 'css/edulatam.css' %}">

    <!-- EduLatam CSS loaded via static file above -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fs-4" href="/">SubjectSupport</a>
            <div class="ms-auto d-flex gap-2">
                {% block nav_buttons %}{% endblock %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="mt-5">
        <div class="container text-center">
            <p class="mb-1 fw-bold text-white">SubjectSupport</p>
            <p class="small mb-0">Conectando estudiantes y tutores en América Latina 🌎</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>

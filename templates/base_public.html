<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SubjectSupport{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2D3748;
            --accent: #4A6CF7;
            --light-bg: #F7FAFC;
        }
        .navbar-brand { font-weight: 700; color: var(--accent) !important; }
        .btn-accent { background: var(--accent); color: white; border: none; }
        .btn-accent:hover { background: #3451d1; color: white; }
        .hero-section { background: var(--primary); color: white; padding: 80px 0; }
        .feature-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; height: 100%; }
        .feature-icon { font-size: 2rem; margin-bottom: 12px; }
        footer { background: var(--primary); color: #A0AEC0; padding: 40px 0; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body style="background: var(--light-bg);">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fs-4" href="/">SubjectSupport</a>
            <div class="ms-auto d-flex gap-2">
                {% block nav_buttons %}{% endblock %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="mt-5">
        <div class="container text-center">
            <p class="mb-1 fw-bold text-white">SubjectSupport</p>
            <p class="small mb-0">Conectando estudiantes y tutores en América Latina 🌎</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>

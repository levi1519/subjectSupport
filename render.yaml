services:
  # Web Service - Django Application
  - type: web
    name: subjectsupport
    env: python
    region: oregon
    plan: free

    # Build configuration
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn subjectSupport.wsgi:application

    # Health check
    healthCheckPath: /

    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

      - key: DEBUG
        value: False

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: .onrender.com

      - key: SKIP_GEO_CHECK
        value: False

      - key: CSRF_TRUSTED_ORIGINS
        sync: false
        # Set this manually in Render dashboard: https://your-app-name.onrender.com

      - key: DATABASE_URL
        fromDatabase:
          name: subjectsupport-db
          property: connectionString

  # PostgreSQL Database
  - type: pgsql
    name: subjectsupport-db
    region: oregon
    plan: free
    databaseName: subjectsupport
    databaseUser: subjectsupport_user

    # Database configuration
    ipAllowList: []

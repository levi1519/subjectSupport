[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "python312Packages.setuptools", "python312Packages.wheel", "gcc", "gdal", "postgresql", "libjpeg", "libpng", "zlib"]

[phases.install]
cmds = [
    "python -m venv /opt/venv && . /opt/venv/bin/activate",
    "pip install --upgrade pip setuptools wheel",
    "pip install -r requirements.txt"
]

[phases.build]
cmds = ["chmod +x build.sh && chmod +x start.sh"]

[start]
cmd = "bash start.sh"

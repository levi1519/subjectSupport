[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "python312Packages.setuptools", "python312Packages.wheel", "gcc", "gdal", "libpq", "libjpeg", "libpng", "zlib"]

[phases.install]
cmds = ["python -m pip install --upgrade pip setuptools wheel", "python -m pip install -r requirements.txt"]

[phases.build]
cmds = ["chmod +x build.sh && chmod +x start.sh"]

[start]
cmd = "bash start.sh"

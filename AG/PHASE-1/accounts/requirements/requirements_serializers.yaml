project_id: subjectsupport-thesis
layer: serializers
app: accounts
parent_requirements: globalRequirements.json
version: '2.0'
traceability:
  functional:
  - RF-002
  - RF-004
  non_functional:
  - RNF-001
  - RNF-002
  - RNF-004
  - RNF-009
requirements:
- id: REQ-SER-ACC-001
  module: TutorProfileSerializer
  parent_trace:
  - RF-002
  - RF-004
  - RNF-001
  - RNF-002
  contracts:
    MUST:
    - TutorProfileSerializer MUST use explicit fields list — MUST NOT use '__all__'
      (RNF-002, RF-002)
    - TutorProfileSerializer MUST expose only public tutor data before session confirmation
      (RF-002)
    - TutorProfileSerializer MUST implement subject_count as SerializerMethodField
      or annotated field — MUST NOT use instance.subjects.count() in to_representation()
      (RNF-001)
    - Views using TutorProfileSerializer MUST annotate queryset with Count('subjects')
      to avoid N+1 (RNF-001)
    SHOULD:
    - TutorProfileSerializer SHOULD use TutorProfileListSerializer for list endpoints
      for performance (RNF-001)
    MUST_NOT:
    - TutorProfileSerializer MUST NOT expose sensitive personal data (phone, email)
      before session confirmation (RF-002)
    - TutorProfileSerializer MUST NOT perform database queries inside to_representation()
      (RNF-001)
  out_of_scope:
  - View-level permission checks (COVERED_BY_VIEWS)
  - Session confirmation logic (COVERED_BY_SERVICES)
- id: REQ-SER-ACC-002
  module: SubjectSerializer
  parent_trace:
  - RF-004
  - RNF-004
  contracts:
    MUST:
    - 'SubjectSerializer MUST use explicit fields: id, name, slug (RNF-004)'
    - SubjectSerializer id and slug MUST be read_only (RNF-002)
    MUST_NOT:
    - SubjectSerializer MUST NOT use '__all__' (RNF-004)
  out_of_scope:
  - Category management (COVERED_BY_ADMIN)

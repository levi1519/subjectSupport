schema_version: '2.0'
project_id: subjectsupport-latam-mvp
branch: latam-mvp
layer: forms
app: accounts
parent_requirements: globalRequirements.json
iso_standard: ISO/IEC 25010:2011
version: '4.0'
traceability:
  functional:
  - RF-002
  - RF-003
  - RF-004
  - RF-014
  - RF-020
  - RF-023
  non_functional:
  - RNF-002
  - RNF-006
  - RNF-008
  - RNF-010
  - RNF-016
requirements:
- id: REQ-FORM-ACC-001
  module: TutorRegistrationForm
  iso_coverage:
    Security:
    - Integrity
    - Access Control
    Usability:
    - User Error Protection
    Functional Suitability:
    - Functional Correctness
  parent_trace:
  - RF-004
  - RNF-002
  - RNF-006
  - RNF-010
  contracts:
    MUST:
    - TutorRegistrationForm MUST validar unicidad de email via clean_email() (RF-002)
    - TutorRegistrationForm MUST limitar selección de materias a máximo 5 via clean_subjects()
      (RF-004-A)
    - TutorRegistrationForm.save() MUST establecer user_type='tutor' y username=email
      (RF-002)
    - TutorRegistrationForm.save() MUST crear TutorProfile y asignar subjects via
      ManyToMany (RF-004-A)
    - TutorRegistrationForm.save() MUST capturar country_code desde kwargs y asignarlo
      a User.country_code (RF-002-B)
    - TutorRegistrationForm MUST usar Meta.fields explícito — MUST NOT usar '__all__'
      (RNF-002)
    - TutorRegistrationForm MUST mostrar errores de validación en español (RNF-006)
    MUST_NOT:
    - TutorRegistrationForm MUST NOT permitir emails duplicados (RF-002)
    - TutorRegistrationForm MUST NOT permitir más de 5 materias (RF-004-A)
    - TutorRegistrationForm MUST NOT establecer user_type fuera de 'tutor' (RF-002)
  out_of_scope:
  - Document validation for tutors (COVERED_BY_ADMIN)
  - View-level registration flow (COVERED_BY_VIEWS)
- id: REQ-FORM-ACC-002
  module: ClientRegistrationForm
  iso_coverage:
    Security:
    - Confidentiality
    - Integrity
    Usability:
    - User Error Protection
    Functional Suitability:
    - Functional Appropriateness
  parent_trace:
  - RF-002
  - RF-003
  - RNF-002
  - RNF-006
  - RNF-008
  contracts:
    MUST:
    - ClientRegistrationForm MUST validar unicidad de email via clean_email() (RF-002)
    - ClientRegistrationForm MUST requerir parent_name Y parent_email cuando is_minor=True
      via clean() (RF-003, RNF-008)
    - ClientRegistrationForm.save() MUST establecer user_type='client' y username=email
      (RF-002)
    - ClientRegistrationForm.save() MUST crear ClientProfile con is_minor y parent_name
      (RF-003)
    - ClientRegistrationForm.save() MUST capturar country_code desde kwargs y asignarlo
      a User.country_code (RF-002-B)
    - ClientRegistrationForm MUST usar Meta.fields explícito (RNF-002)
    - ClientRegistrationForm MUST mostrar errores de validación en español (RNF-006)
    MUST_NOT:
    - ClientRegistrationForm MUST NOT permitir registro de menor sin parent_name Y
      parent_email (RF-003, RNF-008)
    - ClientRegistrationForm MUST NOT establecer user_type fuera de 'client' (RF-002)
  out_of_scope:
  - Parental email verification flow (COVERED_BY_VIEWS)
  - Admin notification for minors (COVERED_BY_VIEWS)
- id: REQ-FORM-ACC-003
  module: ClientProfileEditForm / TutorProfileEditForm
  iso_coverage:
    Security:
    - Integrity
    Usability:
    - User Error Protection
  parent_trace:
  - RF-002
  - RF-004
  - RNF-002
  - RNF-006
  contracts:
    MUST:
    - Ambos forms MUST validar unicidad de email excluyendo usuario actual via clean_email()
      (RF-002)
    - TutorProfileEditForm MUST validar hourly_rate no negativo y <= 9999 (RF-004-D)
    - Ambos forms MUST usar Meta.fields explícito (RNF-002)
    - Ambos forms.save() MUST actualizar User.email cuando cambie (RF-002)
    - Ambos forms MUST mostrar errores de validación en español (RNF-006)
    MUST_NOT:
    - Forms MUST NOT permitir actualizar email a dirección usada por otro usuario
      (RF-002)
    - Forms MUST NOT exponer campos más allá de Meta.fields definido (RNF-002)
  out_of_scope:
  - View-level access control (COVERED_BY_VIEWS)
- id: REQ-FORM-ACC-004
  module: TutorSubjectsForm
  iso_coverage:
    Functional Suitability:
    - Functional Correctness
    - Functional Appropriateness
    Usability:
    - Operability
    - User Error Protection
  parent_trace:
  - RF-004
  - RF-004-A
  - RF-020
  - RNF-006
  - RNF-016
  contracts:
    MUST:
    - TutorSubjectsForm MUST use CheckboxSelectMultiple widget for subjects_taught
      field — MUST NOT use SelectMultiple (RF-020, RNF-016)
    - TutorSubjectsForm MUST include clean_subjects_taught() validating maximum 5
      subjects selected — MUST raise ValidationError in Spanish if exceeded (RF-004-A)
    - TutorSubjectsForm.subjects_taught queryset MUST be Subject.objects.all().order_by('knowledge_area__name',
      'name') (RF-020)
    - TutorSubjectsForm MUST use Meta.fields = ['subjects_taught'] explicitly — MUST
      NOT use '__all__' (RNF-002)
    MUST_NOT:
    - TutorSubjectsForm MUST NOT allow more than 5 subjects — MUST NOT rely only on
      view-level validation (RF-004-A)
    - TutorSubjectsForm MUST NOT use SelectMultiple widget — requires Ctrl+Click,
      breaks mobile UX (RNF-016)
  out_of_scope:
  - Subject grouping context injection (COVERED_BY_VIEWS)
  - Subject creation (COVERED_BY_ADMIN)
- id: REQ-FORM-ACC-005
  module: TutorRegistrationForm + ClientRegistrationForm + TutorProfileEditForm +
    ClientProfileEditForm — Cédula
  iso_coverage:
    Functional Suitability:
    - Functional Completeness
  parent_trace:
  - RF-023
  contracts:
    MUST:
    - TutorRegistrationForm MUST include optional field 'cedula' CharField max_length=20,
      required=False (RF-023)
    - ClientRegistrationForm MUST include optional field 'cedula' CharField max_length=20,
      required=False (RF-023)
    - TutorProfileEditForm MUST include optional field 'cedula' CharField max_length=20,
      required=False (RF-023)
    - ClientProfileEditForm MUST include optional field 'cedula' CharField max_length=20,
      required=False (RF-023)
    - All cedula fields MUST show label 'Cédula / Identificación' in Spanish (RNF-006)
    MUST_NOT:
    - cedula fields MUST NOT have format validation in MVP — MUST accept any alphanumeric
      string (RF-023)
    - cedula MUST NOT be required — existing users have no cedula stored (RF-023)
  out_of_scope:
  - Cedula uniqueness validation (DEFERRED post-MVP)
  - Government API validation (DEFERRED post-MVP)

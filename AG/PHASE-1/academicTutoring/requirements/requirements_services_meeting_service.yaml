schema_version: '2.0'
project_id: subjectsupport-latam-mvp
branch: latam-mvp
layer: services_meeting_service
app: academicTutoring
parent_requirements: globalRequirements.json
iso_standard: ISO/IEC 25010:2011
version: '1.0'
traceability:
  functional:
  - RF-006
  - RF-006-A
  non_functional:
  - RNF-003
  - RNF-004
  - RNF-009
requirements:
- id: REQ-MEET-001
  module: create_meeting_for_session(session)
  iso_coverage:
    Functional Suitability:
    - Functional Completeness
    Reliability:
    - Fault Tolerance
  parent_trace:
  - RF-006
  - RF-006-A
  - RNF-003
  contracts:
    MUST:
    - 'create_meeting_for_session() MUST support platforms: google_meet, zoom, custom
      (RF-006-A)'
    - 'create_meeting_for_session() MUST return dict with keys: meeting_url, host_join_url,
      meeting_id, meeting_password (RNF-004)'
    - create_meeting_for_session() MUST default to google_meet when platform is unrecognized
      (RNF-003)
    MUST_NOT:
    - create_meeting_for_session() MUST NOT raise exceptions — MUST return valid dict
      for any platform (RNF-003)
  out_of_scope:
  - Real API integration with Google Meet/Zoom (future feature — currently generates
    placeholder URLs)
  - Meeting persistence (COVERED_BY_SERVICES_INIT)
- id: REQ-MEET-002
  module: update_session_with_meeting(session, save=True)
  iso_coverage:
    Functional Suitability:
    - Functional Correctness
    Reliability:
    - Fault Tolerance
  parent_trace:
  - RF-006
  - RNF-004
  contracts:
    MUST:
    - update_session_with_meeting() MUST populate session.meeting_url, session.host_join_url,
      session.meeting_id, session.meeting_password (RF-006)
    - update_session_with_meeting() MUST respect save=True/False parameter (RNF-004)
    - update_session_with_meeting() MUST return updated session instance (RNF-004)
    MUST_NOT:
    - update_session_with_meeting() MUST NOT save session when save=False is passed
      (RNF-004)
  out_of_scope:
  - Transaction management (COVERED_BY_SERVICES_INIT)
- id: REQ-MEET-003
  module: generate_meeting_password(length)
  iso_coverage:
    Security:
    - Confidentiality
  parent_trace:
  - RNF-002
  contracts:
    MUST:
    - generate_meeting_password() MUST use secrets module — MUST NOT use random module
      (RNF-002)
    - generate_meeting_password() MUST generate alphanumeric password (RNF-002)
    MUST_NOT:
    - generate_meeting_password() MUST NOT use predictable random sources (RNF-002)
  out_of_scope:
  - Password storage (COVERED_BY_MODELS)

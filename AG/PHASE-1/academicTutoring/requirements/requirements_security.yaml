  - RNF-003
  - RNF-004
  - RNF-007
  - RNF-009
  - RNF-011
requirements:
- id: REQ-SEC-001
  module: GeoRestrictionMiddleware
  iso_coverage:
    Security:
    - Confidentiality
    - Integrity
    - Accountability
    Reliability:
    - Fault Tolerance
    Maintainability:
    - Modularity
    - Modifiability
  parent_trace:
  - RF-001
  - RF-001-A
  - RF-001-B
  - RF-001-C
  - RF-001-D
  - RNF-002
  - RNF-003
  - RNF-004
  - RNF-007
  contracts:
    MUST:
    - Middleware MUST interceptar ALL requests y resolver CountryConfig desde DB antes
      de procesar (RF-001-C)
    - Middleware MUST cachear CountryConfig en django cache con TTL de 60 segundos
      — MUST NOT consultar DB en cada request (RNF-009)
    - 'Middleware MUST excluir paths: /admin/, /gestion-ss-2026/, /servicio-no-disponible/,
      /notificarme/, /static/, /media/, /accounts/logout/, /internal/ (RF-011)'
    - Middleware MUST hacer bypass completo para usuarios autenticados — MUST NOT
      re-verificar geo en cada request (RF-001)
    - Middleware MUST delegar verificación geo a check_geo_restriction() en geoconfig.geo
      — MUST NOT reimplementar lógica (RNF-004)
    - Middleware MUST delegar resolución de CountryConfig a geoconfig.geo o servicio
      dedicado — MUST NOT tener lógica de país inline (RNF-011)
    - 'Cuando country_code NO está en ningún CountryConfig activo: Middleware MUST
      redirigir a /servicio-no-disponible/ (RF-001-D)'
    - 'Cuando CountryConfig.active=False: Middleware MUST redirigir a /servicio-no-disponible/
      (RF-001-D)'
    - 'Cuando CountryConfig.active=True: Middleware MUST permitir acceso completo
      a /estudiantes/ Y /tutores/ sin verificación de polígono (RF-001-A, RF-001-B)'
    - Middleware MUST adjuntar geo_data al objeto request para consumo downstream
      en views (RF-001)
    - 'Middleware MUST almacenar en sesión: geo_blocked, geo_city, geo_region, geo_country
      en caso de denegación (RNF-007)'
    - 'Middleware MUST logear TODOS los intentos de acceso con: path, country_code,
      country_config_result, granted=True/False (RNF-007)'
    - Middleware MUST manejar fallo de API geo gracefully — fallo MUST resultar en
      deny, MUST NOT en 500 (RNF-003)
    SHOULD:
    - Middleware SHOULD cachear geo_data en sesión para reducir llamadas a API externa
      (RNF-009)
    - Middleware SHOULD logear cache hits para monitoreo de performance (RNF-007)
    MUST_NOT:
    - Middleware MUST NOT contener lógica de routing específica por country_code hardcodeado
      (RNF-011)
    - Middleware MUST NOT reimplementar lógica de verificación PostGIS — MUST delegar
      a geoconfig (RNF-004)
    - Middleware MUST NOT exponer detalles técnicos de geo-restriction al usuario
      final (RNF-002)
    - Middleware MUST NOT logear datos personales más allá de IP y ciudad (RNF-007)
    - Middleware MUST NOT bloquear rutas de admin o static (RF-011)
    - Middleware MUST NOT fallar silenciosamente — todos los errores MUST loggearse
      en ERROR level (RNF-007)
  out_of_scope:
  - Geolocation API implementation (COVERED_BY_GEOCONFIG)
  - CountryConfig model definition (COVERED_BY_MODELS)
  - ServiceArea model logic (COVERED_BY_MODELS)
  - User authentication logic (COVERED_BY_ACCOUNTS_VIEWS)
  - Admin panel security (COVERED_BY_DJANGO_ADMIN)
- id: REQ-SEC-002
  module: geoconfig.geo — check_geo_restriction()
  iso_coverage:
    Security:
    - Integrity
    Reliability:
    - Fault Tolerance
    - Maturity
    Maintainability:
    - Modularity
  parent_trace:
  - RF-001
  - RF-007
  - RNF-003
  - RNF-004
  - RNF-009
  contracts:
    MUST:
    - check_geo_restriction() MUST residir en geoconfig/geo.py — MUST NOT estar en
      apps/ (RNF-004)
    - 'check_geo_restriction() MUST retornar dict con: allowed, city, region, country,
      country_code, latitude, longitude, service_area, skip_check, country_config
      (RNF-004)'
    - check_geo_restriction() MUST verificar SKIP_GEO_CHECK primero — si True, MUST
      retornar allowed=True sin llamada API (RNF-010)
    - check_geo_restriction() MUST usar cache de sesión para geo_data con TTL de 3600
      segundos (RNF-009)
    - is_point_in_service_area() MUST usar SQL raw con ST_Contains — MUST NOT depender
      de GIS_AVAILABLE (RF-007-C)
    - get_country_config() MUST consultar CountryConfig por country_code — MUST cachearse
      60 segundos (RNF-009)
    - Timeout de API externa MUST ser máximo 3 segundos (RNF-003)
    - Fallo de API MUST retornar allowed=False con detection_failed=True — MUST NOT
      crashear (RNF-003)
    MUST_NOT:
    - geoconfig.geo MUST NOT importar desde apps.academicTutoring directamente — MUST
      usar django.db.connection para SQL raw (RNF-004)
    - Coordenadas inválidas MUST NOT causar excepción no manejada (RNF-003)
  out_of_scope:
  - Middleware routing logic (COVERED_BY_MIDDLEWARE)
  - CountryConfig admin UI (COVERED_BY_ADMIN)
